name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: Offline suite (${{ matrix.os }} | Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev + viz extras
        run: |
          python -m pip install --upgrade pip
          # Need [viz] so the 24 viz tests can import matplotlib + folium.
          pip install -e ".[dev,viz]"

      - name: Lint with ruff
        run: ruff check aihydro_data tests

      - name: Run offline suite (≥199 tests expected)
        env:
          # Disable transient retry — irrelevant offline, slows the suite.
          AIHYDRO_DATA_NO_RETRY: "1"
        run: |
          pytest -m "not live" -q --tb=short

      - name: Verify public API + version
        run: |
          python -c "from aihydro_data import __version__, fetch, list_products, get_product; print('aihydro-data', __version__, '|', len(list_products()), 'products')"

  build-wheel:
    name: Build sdist + wheel
    needs: offline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Inspect with twine
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aihydro-data-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  smoke-from-wheel:
    name: Fresh-install smoke test
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: aihydro-data-dist, path: dist }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install from wheel + smoke test
        run: |
          pip install dist/*.whl
          python -c "
          import aihydro_data
          assert hasattr(aihydro_data, 'fetch')
          assert hasattr(aihydro_data, 'list_products')
          n = len(aihydro_data.list_products())
          print(f'OK: aihydro-data {aihydro_data.__version__} ({n} products)')
          assert n >= 34, f'Expected ≥34 products, got {n}'
          "
